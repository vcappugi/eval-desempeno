<!-- VIEW: EVALUACIONES PANEL -->
<section id="viewEvaluaciones" style="display: none;">
  <div class="premium-card">
    <h2><i class="fa-solid fa-users-gear text-primary"></i> Personal a su Cargo</h2>
    <p>Seleccione el trabajador que desea evaluar. Solo se muestran los trabajadores bajo su supervisión directa.</p>
    
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Ficha</th>
            <th>Cédula</th>
            <th>Nombre y Apellido</th>
            <th>Departamento</th>
            <th>Cargo</th>
            <th style="text-align: right;">Acciones</th>
          </tr>
        </thead>
        <tbody id="subordinadosTableBody">
          <!-- Subordinados populated here -->
        </tbody>
      </table>
    </div>
  </div>
  
  <!-- DYNAMIC EVALUATION VIEW (Hidden initially until worker is selected) -->
  <div id="evaluationFormContainer" class="premium-card" style="display: none;">
    <div class="evaluation-header">
      <button class="outline secondary" style="float: right; padding: 0.25rem 0.75rem;" onclick="closeEvaluationForm()">
        <i class="fa-solid fa-arrow-left"></i> Volver a la Lista
      </button>
      <h3 style="margin: 0;"><i class="fa-solid fa-file-invoice text-primary"></i> Evaluación de Desempeño</h3>
      <p style="margin: 0.25rem 0 0 0;">Evaluado: <strong id="evaluadoNombreLabel" class="text-primary">Nombre</strong> | Ficha: <span id="evaluadoFichaLabel">Ficha</span></p>
    </div>

    <form id="evaluationForm" onsubmit="saveEvaluation(event)">
      <input type="hidden" id="evaluadoIdInput">
      <input type="hidden" id="evaluacionIdInput"> <!-- Se llena si estamos editando -->
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
        <label for="evalFecha">
          Fecha de Evaluación
          <input type="date" id="evalFecha" required onchange="checkEvaluationDateUnique()">
        </label>
        
        <label for="evalEstadoLabel">
          Estado
          <input type="text" id="evalEstadoLabel" value="Abierta (Editable)" readonly>
        </label>
      </div>
      
      <!-- Dynamic competencies and aspects will render here -->
      <div id="dynamicCompetenciesContainer"></div>
      
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
        <button type="button" class="outline secondary" onclick="closeEvaluationForm()">Cancelar</button>
        <button type="submit" class="primary" id="btnGuardarEvaluacion">
          <i class="fa-solid fa-floppy-disk"></i> Guardar Evaluación
        </button>
      </div>
    </form>
  </div>
</section>
