<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Evaluación de Desempeño - BEL</title>
  
  <!-- Pico.css v2 CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  
  <!-- FontAwesome v6 CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css?v=2.0.8">
</head>
<body>

  <!-- SIDEBAR MOBILE OVERLAY -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar(false)"></div>

  <!-- VIEW: LOGIN (Appears when not logged in) -->
  <div id="loginView" class="login-wrapper">
    <article class="login-card">
      <div class="login-logo">
        <img src="images/BEL_LOGO.jpg" alt="BEL Logo" onerror="this.src='https://placehold.co/120x80/2e7d32/ffffff?text=BEL+Group'">
        <h1 class="login-title">Evaluación de Desempeño</h1>
        <small style="color: var(--muted-color)">Corporacion BEL</small>
      </div>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <label for="loginUsername">
          Usuario o Cédula
          <input type="text" id="loginUsername" placeholder="Ingrese su usuario o cédula" required>
        </label>
        
        <label for="loginPassword">
          Contraseña
          <input type="password" id="loginPassword" placeholder="Ingrese su contraseña" required>
        </label>
        
        <fieldset>
          <label for="rememberMe">
            <input type="checkbox" id="rememberMe">
            Recordarme en este dispositivo
          </label>
        </fieldset>
        
        <button type="submit" class="primary" id="loginSubmitBtn">
          <i class="fa-solid fa-right-to-bracket mr-2"></i> Iniciar Sesión
        </button>
      </form>
    </article>
  </div>

  <!-- FIXED HEADER (Visible when logged in) -->
  <header id="mainHeader" class="main-header" style="display: none;">
    <div style="display: flex; align-items: center; gap: 0.5rem;">
      <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle Menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <a href="#" class="header-brand">
        <img src="images/BEL_LOGO.jpg" alt="BEL Logo" class="header-logo" onerror="this.src='https://placehold.co/80x50/2e7d32/ffffff?text=BEL'">
        <span class="d-none-mobile">Corporacion BEL</span>
      </a>
    </div>
    
    <!-- Header Slogan -->
    <div class="header-slogan d-none-mobile" style="font-style: italic; font-weight: 600; color: var(--primary); font-size: 0.95rem; text-align: center; flex: 1;">
      Rumbo a la transformación digital !
    </div>
    
    <div class="header-actions">
      <!-- Theme Toggle -->
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar Tema">
        <i id="themeIcon" class="fa-solid fa-moon"></i>
      </button>
      <!-- Log Out -->
      <button class="outline contrast" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="handleLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> <span class="d-none-mobile">Salir</span>
      </button>
    </div>
  </header>

  <!-- APP LAYOUT (Visible when logged in) -->
  <div id="appContainer" class="app-container" style="display: none;">
    
    <!-- SIDEBAR -->
    <aside id="appSidebar" class="sidebar">
      <nav>
        <ul class="sidebar-menu">
          <li class="sidebar-item-header">Evaluaciones</li>
          <li>
            <a id="navEvaluaciones" class="sidebar-link active" onclick="switchView('evaluaciones')">
              <i class="fa-solid fa-file-signature"></i>
              <span>Evaluaciones</span>
            </a>
          </li>
          <li>
            <a id="navIndicadores" class="sidebar-link" onclick="switchView('indicadores')">
              <i class="fa-solid fa-chart-pie"></i>
              <span>Indicadores Generales</span>
            </a>
          </li>
          <li>
            <a id="navReporteSubordinados" class="sidebar-link" onclick="switchView('reporteSubordinados')">
              <i class="fa-solid fa-file-invoice"></i>
              <span>Informe de Subordinados</span>
            </a>
          </li>
          
          <!-- Admin options (shown conditionally) -->
          <li class="sidebar-item-header admin-only">Panel Administrativo</li>
          <li class="admin-only">
            <a id="navAdmin" class="sidebar-link" onclick="switchView('admin')">
              <i class="fa-solid fa-sliders"></i>
              <span>Panel Administrativo</span>
            </a>
          </li>
        </ul>
      </nav>
      
      <!-- User Badge Footer -->
      <div class="sidebar-footer">
        <div class="user-badge" style="justify-content: space-between; width: 100%;">
          <div style="display: flex; align-items: center; gap: 0.75rem; min-width: 0; flex-grow: 1;">
            <div class="user-avatar" id="userAvatar">U</div>
            <div class="user-info" style="min-width: 0; flex-grow: 1;">
              <span class="user-name" id="userName" style="display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Cargando...</span>
              <span class="user-role" id="userRole" style="display: block;">Rol</span>
            </div>
          </div>
          <button onclick="openPasswordModal()" style="padding: 0.25rem; margin: 0; border: none; background: transparent; cursor: pointer; color: rgba(255, 255, 255, 0.8); display: flex; align-items: center; justify-content: center; width: 28px; height: 28px;" title="Cambiar Contraseña">
            <i class="fa-solid fa-key"></i>
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="mainContent" class="main-content" style="display: flex; flex-direction: column; min-height: calc(100vh - var(--header-height)); justify-content: space-between;">
      
      <!-- Views Container -->
      <div id="viewsContainer" style="flex-grow: 1;"></div>
      
      <!-- FOOTER -->
      <footer class="app-footer" style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 1rem; text-align: center; padding-bottom: 1rem; width: 100%;">
        <small style="color: var(--muted-color); font-weight: 500;">
          Gerencia de Transformación Digital
        </small>
      </footer>
      
    </main>
  </div>

  <!-- TOAST NOTIFICATION CONTAINER -->
  <div id="toastContainer"></div>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Application JS Code (Modular) -->
  <script type="module" src="js/main.js?v=2.1.0"></script>
</body>
</html>
