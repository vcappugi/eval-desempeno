<!-- MODAL: FECHA EVALUACION -->
<dialog id="fechaEvalModal">
  <article style="width: 100%; max-width: 400px;">
    <header>
      <button aria-label="Close" rel="prev" onclick="closeModal('fechaEvalModal')"></button>
      <span id="fechaEvalModalTitle" style="font-weight: 700; font-size: 1.25rem;">Agregar Fecha de Evaluación</span>
    </header>
    <form id="fechaEvalForm" onsubmit="saveFechaEval(event)">
      <input type="hidden" id="fechaEvalIdInput">
      
      <label for="fechaEvalFecha">
        Fecha de Evaluación
        <input type="date" id="fechaEvalFecha" required>
      </label>
      
      <footer style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem;">
        <button type="button" class="outline secondary" onclick="closeModal('fechaEvalModal')">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </footer>
    </form>
  </article>
</dialog>
