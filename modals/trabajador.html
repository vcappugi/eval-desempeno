<!-- MODAL: TRABAJADOR -->
<dialog id="trabajadorModal">
  <article style="width: 100%; max-width: 600px;">
    <header>
      <button aria-label="Close" rel="prev" onclick="closeModal('trabajadorModal')"></button>
      <span id="trabajadorModalTitle" style="font-weight: 700; font-size: 1.25rem;">Agregar Trabajador</span>
    </header>
    <form id="trabajadorForm" onsubmit="saveTrabajador(event)">
      <input type="hidden" id="trabajadorIdInput">
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <label for="trabFicha">
          Ficha
          <input type="text" id="trabFicha" required>
        </label>
        <label for="trabCedula">
          Cédula
          <input type="text" id="trabCedula" required>
        </label>
      </div>

      <label for="trabNombre">
        Nombre Completo
        <input type="text" id="trabNombre" required>
      </label>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <label for="trabEmpresa">
          Empresa
          <input type="text" id="trabEmpresa" required>
        </label>
        <label for="trabDepartamento">
          Departamento
          <input type="text" id="trabDepartamento" required>
        </label>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <label for="trabCargo">
          Cargo
          <input type="text" id="trabCargo" required>
        </label>
        <label for="trabSupervisor">
          Supervisor
          <select id="trabSupervisor">
            <option value="">Ninguno</option>
            <!-- Populated with all workers -->
          </select>
        </label>
      </div>

      <hr style="margin: 1rem 0;">
      <h5 style="margin-bottom: 0.5rem;"><i class="fa-solid fa-key text-primary"></i> Credenciales de Acceso</h5>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <label for="trabUsuario">
          Usuario
          <input type="text" id="trabUsuario" placeholder="Opcional">
        </label>
        <label for="trabRol">
          Rol en el Sistema
          <select id="trabRol">
            <option value="user">Usuario (Solo Evalúa)</option>
            <option value="admin">Administrador (Acceso Completo)</option>
          </select>
        </label>
      </div>

      <label for="trabClave">
        Contraseña
        <input type="password" id="trabClave" placeholder="Escriba la clave para este usuario">
      </label>
      
      <footer style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem;">
        <button type="button" class="outline secondary" onclick="closeModal('trabajadorModal')">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </footer>
    </form>
  </article>
</dialog>
