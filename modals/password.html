<!-- MODAL: CAMBIAR CONTRASEÑA -->
<dialog id="passwordModal">
  <article style="width: 100%; max-width: 500px;">
    <header>
      <button aria-label="Close" rel="prev" onclick="closeModal('passwordModal')"></button>
      <span style="font-weight: 700; font-size: 1.25rem;"><i class="fa-solid fa-key" style="color: var(--primary); margin-right: 0.5rem;"></i> Cambiar Contraseña</span>
    </header>
    <form id="passwordForm" onsubmit="saveNewPassword(event)">
      <label for="currentPassword">
        Contraseña Anterior
        <input type="password" id="currentPassword" placeholder="Ingrese su contraseña anterior" required>
      </label>

      <label for="newPassword">
        Nueva Contraseña
        <input type="password" id="newPassword" placeholder="Ingrese su nueva contraseña" required>
      </label>

      <label for="confirmPassword">
        Confirmar Nueva Contraseña
        <input type="password" id="confirmPassword" placeholder="Confirme su nueva contraseña" required>
      </label>

      <footer style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem;">
        <button type="button" class="outline secondary" onclick="closeModal('passwordModal')">Cancelar</button>
        <button type="submit" class="primary" id="savePasswordSubmitBtn">Actualizar</button>
      </footer>
    </form>
  </article>
</dialog>
