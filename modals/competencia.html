<!-- MODAL: COMPETENCIA -->
<dialog id="competenciaModal">
  <article style="width: 100%; max-width: 500px;">
    <header>
      <button aria-label="Close" rel="prev" onclick="closeModal('competenciaModal')"></button>
      <span id="competenciaModalTitle" style="font-weight: 700; font-size: 1.25rem;">Agregar Competencia</span>
    </header>
    <form id="competenciaForm" onsubmit="saveCompetencia(event)">
      <input type="hidden" id="competenciaIdInput">
      
      <label for="compTitulo">
        Título de la Competencia
        <input type="text" id="compTitulo" required placeholder="Ej. TRABAJO EN EQUIPO">
      </label>
      
      <label for="compDescripcion">
        Descripción / Aspecto General
        <textarea id="compDescripcion" rows="3" required placeholder="Detalle lo que mide esta competencia"></textarea>
      </label>
      
      <label for="compOrden">
        Orden de Visualización
        <input type="number" id="compOrden" required min="1">
      </label>
      
      <footer style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem;">
        <button type="button" class="outline secondary" onclick="closeModal('competenciaModal')">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </footer>
    </form>
  </article>
</dialog>
