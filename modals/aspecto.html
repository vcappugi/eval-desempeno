<!-- MODAL: ASPECTO (ITEM_EVALUACION) -->
<dialog id="aspectoModal">
  <article style="width: 100%; max-width: 500px;">
    <header>
      <button aria-label="Close" rel="prev" onclick="closeModal('aspectoModal')"></button>
      <span id="aspectoModalTitle" style="font-weight: 700; font-size: 1.25rem;">Agregar Aspecto</span>
    </header>
    <form id="aspectoForm" onsubmit="saveAspecto(event)">
      <input type="hidden" id="aspectoIdInput">
      
      <label for="aspClase">
        Competencia Asociada
        <select id="aspClase" required>
          <option value="">Seleccione una competencia...</option>
          <!-- Populated dynamically -->
        </select>
      </label>
      
      <label for="aspDescripcion">
        Descripción del Aspecto Específico
        <textarea id="aspDescripcion" rows="3" required placeholder="Ej. Promueve la colaboración activa entre compañeros"></textarea>
      </label>
      
      <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1rem;">
        <label for="aspTipo">
          Tipo de Respuesta
          <select id="aspTipo" required>
            <option value="rango1,4">Rango del 1 al 4</option>
            <option value="si/no">Sí / No (Radio buttons)</option>
            <option value="text">Texto Abierto</option>
          </select>
        </label>
        <label for="aspOrden">
          Orden
          <input type="number" id="aspOrden" required min="1">
        </label>
        <label for="aspPonderacion">
          Ponderación (%)
          <input type="number" id="aspPonderacion" required min="0" max="100" step="any" placeholder="0">
        </label>
      </div>
      
      <footer style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.5rem;">
        <button type="button" class="outline secondary" onclick="closeModal('aspectoModal')">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </footer>
    </form>
  </article>
</dialog>
